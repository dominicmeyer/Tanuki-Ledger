name: Go Tooling

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  check-formatting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go environment
      uses: actions/setup-go@v5.3.0
      with:
        go-version: "1.23.6"

    - name: Cache Go
      uses: actions/cache@v4
      with:
        key: check-formatting-go-cache
        path: "$GOPATH"

    - name: install goimports
      run: go install golang.org/x/tools/cmd/goimports@v0.30.0

    - name: run goimports
      run: goimports -l .

  check-vet:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go environment
      uses: actions/setup-go@v5.3.0
      with:
        go-version: "1.23.6"

    - name: Cache Go
      uses: actions/cache@v4
      with:
        key: check-vet-go-cache
        path: "$GOPATH"

    - name: Get go packages
      run: go get

    - name: Cache Apt
      uses: actions/cache@v4
      with:
        key: check-vet-apt-cache
        path: /usr

    - name: Setup dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc=4:13.2.0-7* libgl1-mesa-dev=24.0.5-1* xorg-dev=1:7.7+23* libxkbcommon-dev=1.6.0-1*

    - name: run vet
      run: go vet ./...

  check-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go environment
      uses: actions/setup-go@v5.3.0

    - name: Setup dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc=4:13.2.0-7* libgl1-mesa-dev=24.0.5-1* xorg-dev=1:7.7+23* libxkbcommon-dev=1.6.0-1*

    - name: run golangci-lint
      uses: golangci/golangci-lint-action@v6.0.1
      with:
        args: --timeout=30m

  check-cyclo:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go environment
      uses: actions/setup-go@v5.3.0

    - name: install gocyclo
      run: go install github.com/fzipp/gocyclo/cmd/gocyclo@v0.6.0

    - name: run gocyclo
      run: gocyclo -over 30 .

  tests:
    runs-on: ubuntu-latest
    needs: [check-formatting, check-vet, check-lint, check-cyclo]
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go environment
      uses: actions/setup-go@v5.3.0

    - name: Setup dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc=4:13.2.0-7* libgl1-mesa-dev=24.0.5-1* xorg-dev=1:7.7+23* libxkbcommon-dev=1.6.0-1*

    - name: run tests
      run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go environment
      uses: actions/setup-go@v5.3.0

    - name: Setup dependencies
      run: sudo apt-get update && sudo apt-get install -y gcc=4:13.2.0-7* libgl1-mesa-dev=24.0.5-1* xorg-dev=1:7.7+23* libxkbcommon-dev=1.6.0-1*

    - name: build project
      run: go build
